description = "Post specific findings from pr-review results as GitHub PR inline comments"
prompt = """Post specific numbered findings from the previous pr-review result as GitHub PR inline comments for {{args}}.

**IMPORTANT**: Always respond in Japanese regardless of input language.

## Step 1: Summarize review items

Before anything else, look at the conversation history for `pr-review` output and list all findings in a compact format — one line per item:

```
N. [path/to/file.ext:line] Category: 概要
```

Example:
```
1. [src/auth.ts:42] Security: トークンがログに露出する可能性
2. [src/Button.tsx:15-20] Architecture: ロジックの分離を検討
3. [src/utils/format.ts:8] Readability: 変数名をより具体的に
```

## Step 2: Determine which item numbers to post

Parse "{{args}}" for space- or comma-separated numbers (e.g., `1 3 5` or `1,3,5`).

If "{{args}}" is empty, ask the user which item numbers they want to post.
Show the numbered items available from the review output in the conversation history.

## Step 3: Extract review items from context

Look at the conversation history for `pr-review` output. The format is:

```
N. **[path/to/file.ext:line]** Category: Description
```

For each requested number N, extract:
- **file_path**: e.g., `src/services/auth.ts`
- **line_spec**: e.g., `42` (single) or `15-20` (range)
- **category**: e.g., `Security`, `Architecture`, `Bug Risk`
- **description**: the full issue description text

## Step 4: Get PR metadata

Run these commands to collect what you need for posting:

```bash
gh pr view --json number,headRefOid
gh repo view --json owner,name
```

## Step 5: Confirm and post each item

For each item number the user specified, repeat this loop:

### 5a. Show what will be posted

Present the item clearly to the user:

```
項目 N:
  ファイル: path/to/file.ext (行: 42)
  内容:
    **Category**: Description
```

### 5b. Ask for confirmation

Ask the user with a yes/no question:

> この項目をPRにコメントとして投稿しますか？（はい/いいえ）

Wait for the user's response before proceeding to the next item.

### 5c. Post if approved

If the user approves, post the comment using `gh api`.

**For inline comments (file path and line number available):**

```bash
gh api repos/{owner}/{repo}/pulls/{pr_number}/comments \
  -f body="{comment_body}" \
  -f commit_id="{head_sha}" \
  -f path="{file_path}" \
  -F line={end_line} \
  -f side="RIGHT"
```

For multi-line ranges (e.g., `15-20`), also include:
```bash
  -F start_line={start_line} \
  -f start_side="RIGHT"
```

**For general PR comments (fallback when file/line is not available):**

```bash
gh pr comment {pr_number} --body "{comment_body}"
```

### Comment body format

Always use this format so it's clear the comment comes from Gemini:

```markdown
> 🤖 **Gemini Code Review**

**{Category}**: {Description}
```

Example:
```markdown
> 🤖 **Gemini Code Review**

**Security**: Auth token may be exposed in logs — consider using a redaction helper before passing to the logger.
```

### 5d. Skip if declined

If the user says no, move on to the next item without posting.

## Step 6: Summary

After processing all items, report how many comments were posted and how many were skipped.

---

## Notes

- Never post multiple items at once without per-item confirmation.
- Always identify yourself as Gemini in the comment body using the header above.
- If `gh pr view` fails (not in a git repo, or no PR for current branch), ask the user to provide the PR number manually.
- The `gh api` inline comment endpoint requires a valid `commit_id`. If the commit SHA cannot be retrieved, fall back to `gh pr comment`."""
