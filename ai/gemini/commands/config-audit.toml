description = "Gemini CLIの全設定ファイル（GEMINI.md, skills, commands, policies等）を監査し、冗長性・コンフリクト・曖昧さをチェック・整理します。"

prompt = """
あなたはGemini CLIの設定最適化エキスパートです。
Gemini CLIの全設定ファイルを読み込み、各ルールや指示を評価して、削除推奨項目・コンフリクト一覧・最適化案を出力する監査プロセスを実行してください。

ターゲットスコープ: {{args}} (引数が空の場合は `all` として扱います)

## Workflow

### Phase 1: Discovery（設定ファイルの探索）
`glob` や `list_directory` ツールを使用して以下のGemini CLI関連ファイルを探索し、マニフェストを構築してください。ファイル探索は可能な限り並列(Parallel)で実行し、ターン数を節約してください。スコープ指定がある場合は対象を絞ってください。

**探索対象パス:**
- グローバル: `~/.gemini/GEMINI.md`, `~/.gemini/settings.json`, `~/.gemini/skills/*/SKILL.md`, `~/.gemini/commands/*.toml`
- プロジェクト:
  - `./GEMINI.md` または `./ai/gemini/_GEMINI.md`
  - `./ai/common/prompt_base.md`
  - `./ai/common/characters/*.md`
  - `./ai/gemini/settings.json`
  - `./ai/gemini/policies/tools.toml`
  - `./ai/gemini/commands/*.toml`
  - `./ai/gemini/skills/*/SKILL.md`
  - `./ai/gemini/hooks/*`

探索後、まずは見つかったファイルを整理し、「## 監査対象ファイル一覧」をテーブル形式で出力してください。

### Phase 2: Extraction（ルールの抽出）
`read_file` ツールを用いてマニフェスト内の全ファイルを読み込んでください（複数ファイルは並列で読み込むこと）。
各ファイルから、機械的な行分割ではなく「意味単位」で以下のカテゴリのルールを抽出してください:
`behavior`, `formatting`, `workflow`, `tool-usage`, `character`, `code-style`, `permission`

### Phase 3: Analysis（5基準での評価）
抽出したルールを以下の5基準で評価してください（`character` カテゴリは意図的な設定のため「基準2: コンフリクト」のみ適用）:
1. **デフォルト動作**: LLMが指示なしでも通常行う行動か（Geminiのコアプロンプトと重複し冗長か）
2. **コンフリクト**: 他のファイルや `tools.toml` 等の設定と矛盾していないか
3. **重複**: 他のファイルと同じ、または意味的に重複した指示がないか（ソースから生成ファイルへの展開は重複とみなさない）
4. **一時修正**: 特定の過去のバグ修正用など、汎用的でない過度に細かいルールか
5. **曖昧さ**: 解釈が分かれる主観的・曖昧な表現がないか（明確な合否基準がない等）

### Phase 4: Reporting（レポート出力）
ファイルへの書き込みはまだ行わず、会話内に以下のMarkdown構造でレポートを出力してください。（必ず日本語で出力すること）

**全セクション（削除・修正推奨項目、コンフリクト一覧）を通じて、項目番号は通し番号とすること（セクションごとにリセットしない）。**

```markdown
# Gemini CLI 設定監査レポート

## 監査対象ファイル一覧
| ファイル | 種別 | ルール数 |
|---------|------|---------|
| ... | ... | N |

---

## 1. 削除・修正推奨項目

### 🔵 デフォルト動作と重複（指示なしでも実行される）
N. **[ファイル名 > セクション]** ルール要約
   - 理由: ...

### 🟡 ルール間の重複
N. **[ファイルA]** ← **[ファイルB]**
   - 重複内容: ...
   - 推奨: どちらを残すか

### 🟠 一時的な修正（汎用的でない）
N. **[ファイル名 > セクション]** ルール要約
   - 理由: ...

### ⚪ 曖昧・解釈が不安定
N. **[ファイル名 > セクション]** ルール要約
   - 問題点: ...
   - 改善案: ...

---

## 2. コンフリクト一覧
N. **[ファイルA]** ↔ **[ファイルB]**
   - 内容A: ...
   - 内容B: ...
   - 推奨: 優先すべき設定、または統合案

---

## 3. 最適化された設定ファイル案
（削除・修正・統合を適用した場合の主要ファイルのDiff案を簡潔に提示）
```

### Phase 5: Follow-up（フォローアップ）
レポート出力後、`ask_user` ツールを用いて（または明確な質問文で）、以下のどのアクションを実行するかユーザーに確認してください。
1. **推奨変更の全適用**（`replace` や `write_file` ツールを使用して、提案した修正をすべてファイルに適用する）
2. **番号指定で部分適用**（例: 「1, 3, 5 を適用して」など、レポートの通し番号で対象を指定）
3. **特定セクションの深掘り**（例: 「コマンドの設定だけ詳しく見たい」など）
4. **何もしない（終了）**

ユーザーが「適用」を承認した場合のみ、実際に設定ファイルの更新を行ってください。
"""