description = "Analyzes PR review comments based on user instructions"
prompt = """Analyze PR review comments for {{args}}.

**Arguments**: first token = PR comment URL ($COMMENT_URL); rest = user instructions ($PROMPT).

## Gather Context

Extract comment type, ID, owner, repo, and pull_number from $COMMENT_URL:
- If URL contains `#issuecomment-{id}` -> Issue Comment (comment on PR as a whole)
- If URL contains `#discussion_r{id}` -> Review Comment (comment on code lines)

Fetch baseline PR comments with `run_shell_command`:
`gh pr view {pull_number} --comments`

Run only the API calls matching the parsed target:

```bash
gh api repos/{owner}/{repo}/issues/comments/{comment_id}
gh api repos/{owner}/{repo}/pulls/comments/{comment_id}
gh api repos/{owner}/{repo}/pulls/{pull_number}/comments
```

Note: These dynamic API calls will require user confirmation during execution (Gemini CLI limitation).

For Review Comment, reconstruct the target thread with `in_reply_to_id`.
For Issue Comment, target is typically standalone.

## Focused Analysis

Analyze the URL's **target comment** first; use related comments only as context.
Output detailed Japanese analysis in this structure:

### **Target Comment Details**
Author / Posted at / Location / Content

### **Deep Analysis**
Intent / pointed-out issues / technical reasoning / recommended response

### **Related Discussion**
Same-thread discussion flow / relationship to the target comment

### **Recommended Actions**
Specific actions / priority and direction

### **Additional Notes**
Other important information"""
