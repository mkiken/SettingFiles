description = "Implement code changes based on PR review comments, with design review phase before implementation"
prompt = """Implement code changes based on PR review comments for {{args}}.

## Arguments and Pre-fetch

- First `{{args}}` token is `$PR_URL`; the rest is `$PROMPT`.
- Fetch PR comments first:
!{gh pr view {{args}} --comments}

## Workflow

### Phase 1: Analysis

Analyze the target PR comment, `$PROMPT`, affected files, and surrounding code.

During this phase, parse `$PR_URL`, extract owner, repo, pull_number, and
classify the fragment. For `#discussion_r{id}`, use that id as comment_id. For
`#pullrequestreview-{review_id}`, fetch inline comments; use the only comment as
comment_id, ask the user to choose when there are multiple, and treat the review
as standalone when there are none.

For a concrete inline review comment target (`#discussion_r{id}` or a selected
comment from `#pullrequestreview-{review_id}`), always read the complete same
review thread before designing the change:

1. Fetch the target comment with
   `gh api "repos/{owner}/{repo}/pulls/comments/{comment_id}"`.
2. Set `ROOT_COMMENT_ID` to `in_reply_to_id` when present or the target `id`
   otherwise.
3. Fetch all PR review comments with
   `gh api "repos/{owner}/{repo}/pulls/{pull_number}/comments" --paginate`.
4. Filter to comments where `id == ROOT_COMMENT_ID` or
   `in_reply_to_id == ROOT_COMMENT_ID`, then sort by `created_at`.

Treat the URL target as primary, but use same-thread comments as required
context. If replies add corrections, constraints, or implementation intent,
reflect that in the design before editing.

### Phase 2: Design Review (MANDATORY)

Before editing, present a Japanese design covering:

- target comment and requested change
- target files, code changes, new files, and tests
- affected code/docs, risks, chosen approach, alternatives, and open questions

Ask: `この設計で実装を進めてよろしいですか?修正点があればお知らせください。`
Wait for approval; revise and re-present if requested.

### Phase 3: Implementation (Only after approval)

Implement only the approved scope, preserve unrelated user changes, follow
project style, and test when applicable.

### Phase 4: Review Changes

Review modified files, confirm they match the design, and check for missing
updates or risks.

### Phase 5: Commit

1. Generate a commit message that references the PR comment, summarizes the
   change, and follows repository convention when present.
2. Stage and commit.
3. Before pushing, record `BEFORE_SHA=$(git rev-parse origin/$(git branch --show-current) 2>/dev/null || git rev-parse HEAD^)`.
4. Push to the remote branch.

### Phase 6: Reply to PR Comment

After successful push, reply to the original PR comment with implemented commit
information.

**⚠️ 原則**: 返信対象が review comment (`#discussion_r{id}`) またはスレッド可能な review comment の場合、**必ずスレッド返信API** (`gh api repos/{owner}/{repo}/pulls/{pull_number}/comments/{comment_id}/replies`) を使用すること。`gh pr comment` は thread API が使えない場合 (純粋な issue comment やスレッド対象が無い review) に限定する。

Gather commit info:

```bash
git log ${BEFORE_SHA}..HEAD --format='%H %s'
```

```
ご指摘ありがとうございます。対応しました。

- Commit: {full_hash}
  - {commit_subject}
```

Repeat per commit if multiple.

Parse `$PR_URL`, extract owner/repo/pull_number, then classify the fragment:

| Fragment pattern | Action |
|---|---|
| `#discussion_r(\\d+)` | Extract comment_id → **Thread reply (MUST)** |
| `#pullrequestreview-(\\d+)` | Extract review_id → **Go to Step 2a** |
| `#issuecomment-(\\d+)` or no fragment | **Standalone comment** |

If unclassified, use `ask_user` to choose the reply method.

For `#pullrequestreview-{review_id}`, fetch inline comments:

```bash
gh api repos/{owner}/{repo}/pulls/{pull_number}/reviews/{review_id}/comments \
  --jq '[.[] | {id: .id, path: .path, body: (.body | .[0:80])}]'
```

- 1 comment: use it as thread reply target.
- Multiple: use `ask_user` to select the target comment; then thread reply.
- 0: use standalone comment (`gh pr comment`).

Before posting, use `ask_user` to show method and body:

- Reply method: `Thread reply (スレッド返信)` or `Standalone comment (単発コメント)`
- Target: `comment_id: {id}` or `pull #{pull_number}`
- Body: composed reply body

Question: 「以下の方法・内容で元PRコメントに返信しますか？」

If showing `Standalone comment` for `#discussion_r{id}`, warn and confirm the
downgrade is intentional. Wait for approval before posting.

If user approves:

1. Post with the resolved method.
2. If thread reply API fails, **do not** fallback automatically. Report status
   and response body, then use `ask_user` to choose retry, standalone downgrade,
   or abort.
3. Report `✅ 元のPRコメントに返信しました`.

If user cancels, skip posting and report that the reply was skipped.

## Output Format

During design, output the Japanese design above. During implementation/execution,
briefly report:

- "✅ ファイルXを修正しました"
- "✅ 変更内容を確認しました"
- "✅ コミットを作成しました: [commit message]"
- "✅ リモートブランチにプッシュしました"
- "✅ 元のPRコメントに返信しました (<reply_url_or_comment_link>)"

### Final Summary

Summarize modified files/changes, verification, commit hash/message, reply URL
if posted, and next steps.

## Notes

- Always prioritize user approval on the design before implementation
- If user requests design changes, revise and re-present for approval
- Ensure all changes are tested if applicable
- Follow the project's git commit conventions"""
