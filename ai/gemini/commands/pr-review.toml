description = "Comprehensive PR review using gh command for specified PR number"
prompt = """
!{cat ~/.gemini/common/pr_existing_comments_policy.md}

---

Perform a comprehensive PR review for {{args}}.

CRITICAL: Run these commands FIRST:
!{gh pr view {{args}} --json number,url,title,author,headRefName,baseRefName,isDraft,mergeable,state,additions,deletions,changedFiles}
!{git branch --show-current}
!{bash ~/.config/ai-pr/bin/fetch_existing_comments.sh {{args}}}
!{bash ~/.config/ai-pr/bin/format_pr_diff_with_line_numbers.sh {{args}}}

The `fetch_existing_comments.sh` command above outputs existing PR comments as NDJSON. Use it for duplicate detection per the policy loaded at the top of this prompt.
The `format_pr_diff_with_line_numbers.sh` command above is the authoritative source for review line numbers.

To get the PR body (description), run `gh pr view {{args}} --json body --jq '.body'` via `run_shell_command`.
To see the code changes, use your `run_shell_command` tool to execute `gh pr diff {{args}}`.
If the diff is too large, consider redirecting it to a file (e.g. `gh pr diff {{args}} > diff.txt`) and reading it incrementally.
To list changed files only, run `gh pr diff {{args}} --name-only`.

### **Local vs Remote File Access**

Compare the output of `git branch --show-current` with `headRefName` from the PR metadata above.

**If they match (local mode)** — use local shell commands for file access:
- `grep -n '' path/to/file` to read file contents with stable line numbers
- `find . -type f -name "*.ts"` or `ls -R src/` to explore file structure

**If they don't match (remote mode)** — use gh api:
- `gh api repos/{owner}/{repo}/contents/{path}?ref={headRefName} --jq '.content' | base64 -d | grep -n ''` — Read any file with stable line numbers
- `gh api repos/{owner}/{repo}/git/trees/{headRefName}?recursive=1` — Explore file structure

### **Line Number Source**

Use the output from `format_pr_diff_with_line_numbers.sh` as the authoritative source for final `[path:line]` references:

- `FILE <path>` identifies the current file.
- `NEW <line>` is an added or changed line in the PR head and is the preferred review target.
- `CTX <line>` is unchanged context in the PR head. Use it only when a finding cannot be anchored to a `NEW` line.
- `OLD <line>` is removed base-side code. Do not use `OLD` line numbers in final review comments.

Never calculate final review line numbers from `@@` hunk headers by memory. If a candidate finding is not present in the line-numbered diff, verify the exact current-side line with `grep -n ''` or omit the finding.

### **Review Scope: Changed Code vs Pre-existing Code**

**Primary focus**: Review comments MUST target lines added or modified in this PR's diff. Do not surface issues whose root cause lives entirely in unchanged code that this PR did not touch.

**Pre-existing-code exception (critical only)**: You MAY report a pre-existing issue (one that exists entirely in unchanged code) only when it falls into one of these critical impact categories:

- **Security breach**: concrete exploitable attack vector (auth bypass, RCE, injection, secret exposure)
- **Data corruption/loss**: silent overwrite, missing transaction, irreversible mutation
- **Service outage**: crash, infinite loop, deadlock, resource exhaustion under realistic load
- **Compliance violation**: PII handling, license breach, audit trail loss

For pre-existing findings, mark the header with `[既存コード]` prefix (e.g., `[既存コード] **[path:line]**`) and state which impact category applies. All other pre-existing issues MUST be omitted.

### **Review Breadth**

Review ALL changed files individually. For each file, check ALL 7 review categories below.
Do NOT skip files or categories during analysis, but report only actionable issues with concrete impact and a concrete response.
Do not invent findings to satisfy a target count. A clean PR may legitimately have zero findings.

### **Review Comment Priority**

Assign priority to all review comments:

- 🔴 **High (Action Required)**: Bug risk, security vulnerabilities, data loss
- 🟡 **Medium (Recommended)**: Architecture issues, performance, critical readability
- 🟢 **Low (Optional)**: Maintainability, minor refactoring, style

**Group non-test findings by priority in descending order.**

### **Actionable Findings Only**

Output only findings that require a concrete response: code changes, test additions, design changes, documentation updates, or explicit reviewer decisions.

Do not output praise, compliance confirmations, or non-actionable observations such as "the code follows the convention", "this is well implemented", "no issue here", or "looks good".

Do not include filler sections. `Review Focus Points` and `Recommendations` are optional and must be omitted unless they contain concrete unresolved actions that are not already covered by numbered findings.

If no actionable findings remain after deduplication, output only:

```markdown
対応が必要な指摘はありません。
```

### **Test Finding Routing**

Separate test-related findings from regular code findings:

- Put findings about missing tests, weak assertions, brittle tests, incorrect mocks/fixtures, boundary-value tests, negative/error-path tests, and integration coverage under `## テストに関する指摘`.
- Inside `## テストに関する指摘`, group findings by `High`, `Medium`, and `Low` using the same priority thresholds.
- Keep numbering sequential across regular findings and test findings. Do not restart numbering in the test section.
- Omit `## テストに関する指摘` entirely when there are no actionable test findings.
- If a runtime bug and a missing test share the same root cause, keep the bug in the regular priority section. Mention the missing test in the detail line when it is only supporting evidence; create a separate test finding only when a distinct test change is required.

### **Code Quality Review**

Review thoroughly from the following perspectives:

- **Bug Risk**: Potential bugs and error handling issues
- **Coding Standards**: Adherence to general rules and best practices
- **Architecture**: Separation of concerns, appropriate class/function design
- **Readability**: Code intent clarity, naming conventions, comments
- **Performance**: Performance issues and optimization opportunities
- **Security**: Security vulnerabilities and sensitive data handling
- **Maintainability**: Future change flexibility, avoiding technical debt

**IMPORTANT**: For each review comment, specify the full file path (relative to repository root) and line number(s) in the following format:

- `[path/to/file.ext:line]` for single line comments
- `[path/to/file.ext:startLine-endLine]` for multi-line comments

**Number all findings sequentially across regular priority sections and `## テストに関する指摘` (continue numbering across sections — do not restart per section).**

**Output must be grouped by priority level in descending order (omit priority levels with no findings). Test findings must be moved to `## テストに関する指摘` instead of appearing in the regular priority sections.**

**Finding Format**: Each item MUST use this exact three-part structure — header, detail, then separator:
- **Header line**: `N. **[file:line]** Category: Short one-line summary`
- **Pre-existing header line**: `N. [既存コード] **[file:line]** Category: Short one-line summary (critical impact category)`
- **Detail line**: `   - Full explanation and recommendation (indented sub-bullet)`
- **Separator line**: `---` (horizontal rule — MANDATORY after every finding, including the last one)

The `---` separator after each item is a hard structural requirement that must never be omitted.

✅ CORRECT:

1. **[src/auth.ts:42]** Security: Token may be exposed in logs
   - Auth token is passed directly to the logger. Add a masking step before logging to prevent credential leakage.

---

2. **[src/auth.ts:87]** Bug Risk: Null check missing before user lookup
   - `user` can be null when session expires mid-request, causing an unhandled TypeError.

---

3. [既存コード] **[src/db/query.ts:120]** Security: SQL injection in pre-existing helper (Security breach category)
   - Unchanged code called by this PR's new feature concatenates raw user input into a query string. Concrete attack vector: any string input allows arbitrary SQL execution.

---

❌ WRONG (missing `---` separator and/or single long line):

1. **[src/auth.ts:42]** Security: Auth token may be exposed in logs because it is passed directly to the logger without masking, which could lead to credential leakage in log aggregation systems.
2. **[src/auth.ts:87]** Bug Risk: Null check missing before user lookup which can cause unhandled TypeError.

**Output format:**

#### 🔴 High Priority
1. **[path/to/file.ext:line]** Category: Short summary
   - Detailed explanation and recommendation.

---

2. **[path/to/file.ext:line]** Category: Short summary
   - Detailed explanation and recommendation.

---

#### 🟡 Medium Priority
3. **[path/to/file.ext:line]** Category: Short summary
   - Detailed explanation and recommendation.

---

#### 🟢 Low Priority
4. **[path/to/file.ext:line]** Category: Short summary
   - Detailed explanation and recommendation.

---

## テストに関する指摘

#### 🟡 Medium Priority
5. **[path/to/file.ext:line]** Test Coverage: Short summary
   - Detailed explanation and recommendation for the missing or weak test.

---

Example:

#### 🔴 High Priority
1. **[src/services/auth.ts:42]** Security: Auth token may be exposed in logs
   - Token is logged in plaintext. Apply a masking utility before passing to logger.

---

2. **[src/services/auth.ts:87]** Bug Risk: Null check missing before user lookup
   - `getUser()` returns null on session expiry; add a null guard to prevent TypeError.

---

#### 🟡 Medium Priority
3. **[src/components/Button.tsx:15-20]** Architecture: Consider separating logic
   - Click handler mixes UI event handling with business logic. Extract to a custom hook.

---

4. **[src/utils/api.ts:33]** Performance: Unnecessary re-fetch on every render
   - Data is fetched inside the render function without memoization. Wrap in `useMemo` or move to an effect with proper deps.

---

#### 🟢 Low Priority
5. **[src/utils/format.ts:8]** Readability: Use more descriptive variable names
   - `d` and `v` obscure intent; rename to `date` and `value` for clarity.

---

6. **[src/constants/index.ts:5]** Maintainability: Magic number should be a named constant
   - `3000` is used without explanation. Extract to `const REQUEST_TIMEOUT_MS = 3000`.

---

### **Review Focus Points**

Omit this section unless there are concrete unresolved review focus points that are not already covered by numbered findings.

### **Recommendations**

Omit this section unless there are concrete recommendations that are not already covered by numbered findings.

### **[既コメント済] スキップした指摘**

If any findings were skipped due to duplication with existing PR comments (per the policy at the top), add this section **before** the Post-Review block:

```
## [既コメント済] スキップした指摘

> 既存PRコメントと意味的に重複したため出力から除外:

- **[path:line]** Category / 既存コメント ID: <id> (resolved=<bool>, ai_origin=<value>) — <reason>
```

Omit this section entirely when nothing is skipped.

### **Post-Review**

After completing the review, you MUST delete any temporary files you created during the process (e.g., `diff.txt`, `pr_diff.txt`) using the `run_shell_command` tool.

If at least one actionable finding remains, display the following message to the user after outputting the review results and cleaning up:

> GitHub PRにレビュー結果を投稿するには、以下を実行してください:
> `/pr-comment-post <項目番号>` (例: `/pr-comment-post 1 3 5`)
"""
