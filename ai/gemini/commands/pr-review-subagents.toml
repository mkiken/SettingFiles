description = "Review a PR with six parallel specialist agents. Expects [prNumber]."

prompt = """
Review PR #{{args}} with six specialist agents in parallel. Respond in Japanese.

## Gather Once

Run with `run_shell_command`:

```bash
gh pr view {{args}} --json title,body,baseRefName,headRefName,url
gh pr diff {{args}}
bash ~/.config/ai-pr/bin/format_pr_diff_with_line_numbers.sh {{args}}
gh repo view --json nameWithOwner
git branch --show-current
bash ~/.config/ai-pr/bin/fetch_existing_comments.sh {{args}}
```

Compare current branch with `headRefName`; match means local mode.

## Shared Agent Contract

Pass each agent: PR number, metadata, repo owner/name, full diff, line-numbered diff, existing comments NDJSON, local mode, and head branch.

Common rules:
- Review changed code first. Report unchanged pre-existing code only for security breach, data corruption/loss, service outage, or compliance violation. Prefix `[既存コード]` and name the category.
- Final line references must come from the line-numbered diff: prefer `NEW`; use current-side `CTX` only when no `NEW` line can carry the finding. Never use `OLD`, deleted-file records, hunk arithmetic, ranges, or approximate lines.
- Every agent finding must include `行番号根拠: FILE <path> / NEW|CTX <line> <snippet>` matching its header.
- Deduplicate against unresolved existing comments only when same path within ±5 lines and same root cause, or same fix target, with confidence >= 70. Do not skip resolved or outdated comments; list skipped items separately.
- Output only actionable findings with confidence >= 75. No praise or "looks good" notes.

## Launch Agents

Invoke all six with `wait_for_previous=false`:

1. **pr-reviewer-bugs** — バグ検出・ロジックエラー
2. **pr-reviewer-security** — セキュリティ脆弱性
3. **pr-reviewer-architecture** — アーキテクチャ・設計品質
4. **pr-reviewer-errors** — エラーハンドリング品質
5. **pr-reviewer-history** — Git履歴・リグレッションリスク
6. **pr-reviewer-tests** — テスト品質・カバレッジ

## Aggregate

Drop "no findings" messages. Remove inter-agent duplicates by root cause, keeping the clearest/highest-confidence finding. Recheck existing-comment duplicates and collect skipped items.

Before final output, drop findings without valid `行番号根拠`, findings using `OLD`/deleted/approximate/range lines, and headers not present in the line-numbered diff. Do not show `行番号根拠` in final output.

Route all test-related findings only to `## テストに関する指摘`. If a bug and missing test share one root cause, keep the bug in regular priority and mention testing only as supporting detail.

Priority: High 90-100, Medium 75-89, Low only for notable explicitly reported items below threshold. Number findings sequentially across all sections. Omit empty sections and `## レビュー注目ポイント` unless it adds unresolved actions not already listed. If no actionable findings remain, output only `対応が必要な指摘はありません。`

## Final Format

Every finding must have a header, indented detail bullet, and `---`, including the last finding. Omit empty and skipped-comments sections when empty.

```markdown
## レビューサマリー

| 領域 | 指摘数 | 最高信頼度 |
| ---- | ------ | ---------- |
| バグ検出 | N | XX |
| セキュリティ | N | XX |
| アーキテクチャ | N | XX |
| エラーハンドリング | N | XX |
| Git履歴 | N | XX |
| テスト品質 | N | XX |

## 🔴 High Priority（信頼度90-100）

1. **[file:line]** 領域 (信頼度: XX): 短い一行の要約
   - 詳細説明と推奨対応。

---

## 🟡 Medium Priority（信頼度75-89）

2. **[file:line]** 領域 (信頼度: XX): 短い一行の要約
   - 詳細説明と推奨対応。

---

## 🟢 Low Priority（特筆すべきもの）

3. **[file:line]** 領域 (信頼度: XX): 短い一行の要約
   - 詳細説明と推奨対応。

---

## テストに関する指摘

### 🟡 Medium Priority（信頼度75-89）

4. **[file:line]** テスト品質 (信頼度: XX): 短い一行の要約
   - 詳細説明と推奨対応。

---

## [既コメント済] スキップした指摘
- **[path:line]** 領域: <area> / 既存コメント ID: <id> (resolved=<bool>, ai_origin=<value>) — <reason>

## 総合評価

**マージ可否**: ✅ マージ可 / ⚠️ 条件付きマージ可 / ❌ マージ不可

総合コメント。
```

If at least one actionable finding remains, append:

> To post any findings as GitHub PR comments, run:
> `/pr-comment-post <item numbers>` (e.g., `/pr-comment-post 1 3 5`)
"""
