# Policy Engine rules for shell command permissions
# Migrated from deprecated tools.allowed in settings.json

[[rule]]
toolName = "run_shell_command"
commandPrefix = "base64 "
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = "cat "
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = "echo "
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = "gh pr checks"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = "gh pr diff"
