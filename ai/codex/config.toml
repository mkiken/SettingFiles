approval_policy = 'on-request'
sandbox_mode = 'danger-full-access'
service_tier = 'fast'
plan_mode_reasoning_effort = 'xhigh'
suppress_unstable_features_warning = true

[features]
hooks = true
apps = false
# request_user_input の待機中は Codex の hook event が発火しないため無効化する。
# Stop/通知 hook が動かず、tmux 表示が動作中のまま残る。
# default_mode_request_user_input = true

[agents]
max_threads = 6
max_depth = 1

[mcp_servers]
[mcp_servers.context7]
args = ['-c', 'exec "$HOME/.config/ai-mcp/bin/context7"']
command = 'zsh'

[mcp_servers.sequential-thinking]
args = ['-c', 'exec "$HOME/.config/ai-mcp/bin/sequential-thinking"']
command = 'zsh'

[mcp_servers.chrome-devtools]
args = ['-c', 'exec "$HOME/.config/ai-mcp/bin/chrome-devtools" --no-usage-statistics --no-performance-crux']
command = 'zsh'
startup_timeout_sec = 20
tool_timeout_sec = 120

[tui]
status_line = ['project-name', 'git-branch', 'thread-title', 'task-progress', 'context-remaining', 'five-hour-limit', 'weekly-limit', 'used-tokens', 'model-with-reasoning']

[tui.model_availability_nux]
'gpt-5.5' = 2
