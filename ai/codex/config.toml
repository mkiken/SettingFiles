approval_policy = 'on-request'
sandbox_mode = 'danger-full-access'
service_tier = 'fast'
plan_mode_reasoning_effort = 'xhigh'
suppress_unstable_features_warning = true

[features]
hooks = true
apps = false
terminal_resize_reflow = true
# request_user_input の待機中は Codex の hook event が発火しないため無効化する。
# Stop/通知 hook が動かず、tmux 表示が動作中のまま残る。
# default_mode_request_user_input = true

[agents]
max_threads = 6
max_depth = 1

[mcp_servers]

[tui]
status_line = ['project-name', 'pull-request-number', 'git-branch', 'task-progress', 'context-used', 'context-window-size', 'five-hour-limit', 'weekly-limit', 'model-with-reasoning', 'run-state', 'workspace-headline']
status_line_use_colors = true

[tui.model_availability_nux]
'gpt-5.5' = 4
